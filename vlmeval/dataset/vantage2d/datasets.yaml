# # Dataset configuration for VANTAGE 2D datasets
# # Each dataset can be configured with:
# #   - name: Dataset name (used to reference in code)
# #   - dataset: Dataset class name
# #   - data_root: Root directory containing images/labels
# #   - annotation_file: (grounding only) Path to annotation JSON file

# detection:
#   - name: Astro2D
#     dataset: Astro2DDetectionDataset
#     data_root: s3://<your_bucket>/benchmark/vantage_2d_astro/C0065-QA.m4v
#     # min_bbox_area: optional; default 400 if data_root path ends with "IVA-0009-KPI-05_190916_10ft-60-deg.mp4", else 0

# grounding:
#   - name: VANTAGE_2DGrounding
#     dataset: VANTAGE_2DGroundingDataset
#     data_root: s3://<your_bucket>/benchmark/vantage_2d_grounding/
#     annotation_file: s3://<your_bucket>/benchmark/vantage_2d_grounding/annotations/RefDrone_test.jsonl

Astro2D:
  class: Astro2DDetectionDataset
  data_root: LMUData/datasets/Astro2D

VANTAGE_2D:
  class: VANTAGE_2DDetectionDataset
  data_root: LMUData/datasets/VANTAGE_2D

VANTAGE_2DGrounding:
  class: VANTAGE_2DGroundingDataset
  data_root: LMUData/datasets/VANTAGE_2DGrounding

